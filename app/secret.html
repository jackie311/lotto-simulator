<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- 不公开、不收录：noindex + 不在 sitemap、不被任何页面链接 -->
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>Private scorecard</title>
<link rel="stylesheet" href="style.css" />
<style>
  .secret-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 18px 60px; }
  .secret-wrap h1 { font-size: 22px; margin: 0 0 4px; }
  .secret-wrap .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .secret-controls { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .secret-controls .ctl { display: flex; flex-direction: column; gap: 3px; }
  .secret-controls label { font-size: 12px; color: var(--muted); }
  .secret-controls select { min-width: 150px; }
  .secret-wrap h2 { font-size: 18px; margin: 22px 0 4px; }
  .secret-wrap h3 { font-size: 14px; margin: 12px 0 6px; }
  .secret-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; }
  .mblock { border-top: 1px solid var(--line); padding: 10px 0; }
  .mblock:first-child { border-top: 0; }
  .mhead { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .mhead .mn { font-weight: 600; }
  .mhead .ms { color: var(--muted); font-size: 12.5px; }
  .linerow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 3px 0; }
  .linerow .hit { outline: 2px solid #46d17e; box-shadow: 0 0 0 2px rgba(70,209,126,.25); }
  .linerow .supp { outline: 2px solid var(--gold, #ffcf5c); }
  .linerow .res { font-size: 12.5px; color: var(--muted); }
  .linerow .res b { color: var(--txt); }
  .linerow .res .win { color: #46d17e; font-weight: 700; }
  .actual { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 4px 0 10px; }
  .actual .lbl { color: var(--muted); font-size: 13px; }
  table.trk { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.trk th, table.trk td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--line); }
  table.trk th { color: var(--muted); font-weight: 600; }
  table.trk td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .good { color: #46d17e; }
  .pill { display:inline-block; font-size: 11px; padding: 1px 7px; border-radius: 999px; background: var(--panel2); color: var(--muted); }
  .note { color: var(--muted); font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div class="secret-wrap">
  <div id="secret-head"></div>
  <div class="secret-controls" id="secret-controls"></div>
  <div id="secret-root"></div>
  <div class="note" id="secret-note"></div>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
<script src="secret.js"></script>
</body>
</html>
